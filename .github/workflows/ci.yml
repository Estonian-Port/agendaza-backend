name: Java CI with Gradle

# Esto hace que el workflow corra cada vez que hacés push o creás un Pull Request
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descarga tu código en la maquinita de GitHub
      - uses: actions/checkout@v4

      # 2. Instala Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Le da permisos a Gradle para ejecutarse
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. Corre tus tests y genera el reporte de JaCoCo que configuramos antes
      - name: Run tests and generate coverage report
        run: ./gradlew test jacocoTestReport

      # 5. Sube ese reporte a Codecov
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true